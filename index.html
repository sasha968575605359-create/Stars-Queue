<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars Queue | Очередь выдачи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .stars-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="text-slate-100">

    <div id="root"></div>

    <script>
        // ==========================================
        // ТВОЙ СПИСОК ЗАКАЗОВ (РЕДАКТИРУЙ ТУТ)
        // Формат даты: ГГГГ-ММ-ДДTЧЧ:ММ:ССZ
        // ==========================================
        const manualOrders = [
            { username: 'only_mupiks', addedAt: '2024-05-20T12:00:00Z', waitHours: 72 }
            // Добавляй новые заказы сюда
        ];

        function renderApp() {
            const root = document.getElementById('root');
            const searchTerm = window.searchTerm || '';
            const currentTime = Date.now();

            const getOrderData = (order) => {
                const start = new Date(order.addedAt).getTime();
                const readyAt = start + (order.waitHours * 60 * 60 * 1000);
                const diff = readyAt - currentTime;
                const isReady = diff <= 0;

                let timeLeft = "Готово";
                if (!isReady) {
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    timeLeft = `${hours}ч ${minutes}м`;
                }

                const progress = Math.min(100, Math.max(0, 100 - (diff / (order.waitHours * 3600000) * 100)));
                return { isReady, timeLeft, progress };
            };

            const filteredOrders = manualOrders
                .map(order => ({ ...order, ...getOrderData(order) }))
                .filter(o => o.username.toLowerCase().includes(searchTerm.toLowerCase()))
                .sort((a, b) => new Date(a.addedAt) - new Date(b.addedAt));

            root.innerHTML = `
                <div class="min-h-screen p-4 md:p-8">
                    <header class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div class="flex items-center gap-3">
                            <div class="bg-yellow-500 p-2 rounded-xl stars-glow text-slate-900">
                                <i data-lucide="star" class="fill-current"></i>
                            </div>
                            <div>
                                <h1 class="text-2xl font-bold tracking-tight">Stars Queue</h1>
                                <p class="text-slate-400 text-sm">Официальная очередь выдачи</p>
                            </div>
                        </div>
                        <div class="bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-lg text-sm text-slate-300 flex items-center gap-2">
                            <i data-lucide="timer" class="text-yellow-500 w-4 h-4"></i>
                            <span>Стандарт ожидания: 72 часа</span>
                        </div>
                    </header>

                    <main class="max-w-4xl mx-auto space-y-6">
                        <div class="flex flex-col md:flex-row gap-4 items-center">
                            <div class="relative flex-1 w-full text-slate-400">
                                <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5"></i>
                                <input 
                                    type="text" 
                                    id="searchInput"
                                    placeholder="Введи свой @username..."
                                    value="${searchTerm}"
                                    oninput="updateSearch(this.value)"
                                    class="w-full bg-slate-900 border border-slate-800 rounded-2xl pl-12 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-yellow-500/50 transition-all text-slate-100"
                                />
                            </div>
                            <div class="bg-slate-900 border border-slate-800 px-6 py-3.5 rounded-2xl flex items-center gap-4 whitespace-nowrap">
                                <span class="text-slate-400 text-sm">Активных заказов:</span>
                                <span class="text-xl font-bold text-yellow-500">${manualOrders.length}</span>
                            </div>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                                            <th class="px-6 py-4 font-medium">№</th>
                                            <th class="px-6 py-4 font-medium">Пользователь</th>
                                            <th class="px-6 py-4 font-medium">Статус / Осталось</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-800">
                                        ${filteredOrders.length > 0 ? filteredOrders.map((order, index) => `
                                            <tr class="hover:bg-slate-800/30 transition-colors group">
                                                <td class="px-6 py-4 text-slate-500 font-mono">${index + 1}</td>
                                                <td class="px-6 py-4">
                                                    <div class="flex items-center gap-2 font-semibold text-blue-400">
                                                        @${order.username}
                                                        <a href="https://t.me/${order.username}" target="_blank" class="opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <i data-lucide="external-link" class="w-4 h-4 text-slate-500"></i>
                                                        </a>
                                                    </div>
                                                </td>
                                                <td class="px-6 py-4">
                                                    ${order.isReady ? `
                                                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-green-500/10 text-green-400 text-sm border border-green-500/20">
                                                            <i data-lucide="shield-check" class="w-4 h-4"></i> Готово к выдаче
                                                        </span>
                                                    ` : `
                                                        <div class="flex flex-col">
                                                            <span class="text-sm font-medium text-slate-200 flex items-center gap-2">
                                                                <i data-lucide="clock" class="text-yellow-500 w-3 h-3"></i>
                                                                ${order.timeLeft}
                                                            </span>
                                                            <div class="w-40 h-1 bg-slate-800 rounded-full mt-2 overflow-hidden">
                                                                <div class="h-full bg-yellow-500" style="width: ${order.progress}%"></div>
                                                            </div>
                                                        </div>
                                                    `}
                                                </td>
                                            </tr>
                                        `).join('') : `
                                            <tr>
                                                <td colspan="3" class="px-6 py-12 text-center text-slate-500 italic">Ничего не найдено</td>
                                            </tr>
                                        `}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 text-sm">
                            <div class="p-6 bg-blue-500/5 border border-blue-500/20 rounded-2xl">
                                <h3 class="text-blue-400 font-bold mb-2">Почему 72 часа?</h3>
                                <p class="text-slate-400">Это время необходимо для верификации транзакции Telegram Stars. Безопасность превыше всего.</p>
                            </div>
                            <div class="p-6 bg-yellow-500/5 border border-yellow-500/20 rounded-2xl">
                                <h3 class="text-yellow-500 font-bold mb-2">Обновление</h3>
                                <p class="text-slate-400">Список обновляется вручную после каждой успешной транзакции.</p>
                            </div>
                        </div>
                    </main>

                    <footer class="max-w-4xl mx-auto mt-16 pb-8 text-center text-slate-600 text-[10px] border-t border-slate-800 pt-8">
                        <p>НЕ ЯВЛЯЕТСЯ ПУБЛИЧНОЙ ОФЕРТОЙ. ВСЕ ПРАВА ЗАЩИЩЕНЫ.</p>
                    </footer>
                </div>
            `;
            lucide.createIcons();
            if (window.isFocused) {
                const input = document.getElementById('searchInput');
                if (input) input.focus();
            }
        }

        window.updateSearch = (val) => {
            window.searchTerm = val;
            window.isFocused = true;
            renderApp();
        };

        renderApp();
        setInterval(renderApp, 60000);
    </script>
</body>
</html>
